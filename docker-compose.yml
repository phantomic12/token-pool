services:
  router:
    build: .
    ports:
      - "18080:8000"
    environment:
      - APP_SECRET=${APP_SECRET}
      - DATABASE_URL=/data/router.db
      - TRANSCODE_HW=${TRANSCODE_HW:-auto}
      - MODELS_REFRESH_INTERVAL=${MODELS_REFRESH_INTERVAL:-3600}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
    volumes:
      - router-data:/data
    restart: unless-stopped

  router-gpu:
    extends:
      service: router
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles: [gpu]

volumes:
  router-data:
